services:
  - type: web
    name: ejendompython
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webapp.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: TURSO_URL
        sync: false          # Sættes manuelt i Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false          # Sættes manuelt i Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
