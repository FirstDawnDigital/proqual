  // ── Filter ────────────────────────────────────────────
  function getFiltered() {
    const zip      = document.getElementById("f-zip").value.trim();
    const maxPrice = parseFloat(document.getElementById("f-maxprice").value) || Infinity;
    const minYield = parseFloat(document.getElementById("f-minyield").value) || 0;
    const minRooms = parseInt(document.getElementById("f-minrooms").value)   || 0;
    const maxRooms = parseInt(document.getElementById("f-maxrooms").value)   || 99;
    const minN        = parseInt(document.getElementById("f-minn").value)       || 0;
    const maxCommute  = parseInt(document.getElementById("f-maxcommute").value) || 0;
    const energyMax = document.getElementById("f-energy").value;  // "" | A | B | C | D | E | F | G
    const ENERGY_ORDER = ["A","B","C","D","E","F","G"];
    const energyAllowed = energyMax
      ? new Set(ENERGY_ORDER.slice(0, ENERGY_ORDER.indexOf(energyMax) + 1))
      : null;
    const zips     = zip ? zip.split(/[\s,]+/).map(s=>s.trim()).filter(Boolean) : [];

    const selectedTypes = getSelectedTypes();  // null = alle
    const unregOnly = document.getElementById("f-unreg").value === "1";

    return allData.filter(p => {
      const ann = getAnnotation(p.id);

      // Status-filter chips
      if (statusFilter === "favorite" && ann.status !== "favorite") return false;
      if (statusFilter === "pinned"   && ann.status !== "pinned")   return false;
      if (statusFilter === "edited") {
        const hasEdit = ann.status !== "neutral"
          || (ann.renovation_items && ann.renovation_items.length > 0)
          || ann.renovation_status !== "none"
          || (ann.custom_leje && ann.custom_leje > 0)
          || (ann.custom_price && ann.custom_price > 0)
          || (ann.notes && ann.notes.trim() !== "");
        if (!hasEdit) return false;
      }

      // Diskvalificerede 3-state: 0=standard skjul, 1=eksplicit skjul, 2=kun vis
      if (disqState === 2 && ann.status !== "disqualified") return false;
      if (disqState !== 2 && ann.status === "disqualified") return false;

      // Aktiv række og pinned bypasser øvrige filtre
      if (p.id === activeRowId) return true;
      if (ann.status === "pinned" && statusFilter === "all") return true;

      if (zips.length && !zips.some(z => p.zip_code===z))  return false;
      // Boligtype multi-select
      if (selectedTypes && !selectedTypes.has(p.property_type)) return false;
      // Huslejeregler: kun uregulerede
      if (unregOnly && !isUnregulated(p)) return false;
      if (p.price > maxPrice)                               return false;
      if (minYield>0) {
        const ann2 = getAnnotation(p.id);
        const adj2 = p.price + renoTotal(ann2.renovation_items || []);
        const leje2 = effectiveLeje(p, ann2);
        const ud2 = getUdbetaling();
        const { ydelse: y2 } = computeLoan(adj2, ud2);
        const fy = computeDisplayYield(getYieldType(), leje2, p.owner_costs_monthly ?? 0, y2, adj2, ud2, p);
        if (fy == null || fy < minYield) return false;
      }
      if (p.rooms!=null && p.rooms<minRooms)                return false;
      if (p.rooms!=null && p.rooms>maxRooms)                return false;
      const effN = p.est_leje_v2 != null ? (p.lejedata_v2_antal ?? 0) : (p.lejedata_antal ?? 0);
      if (minN>0 && effN<minN) return false;
      if (energyAllowed && !energyAllowed.has((p.energy_label||"").toUpperCase())) return false;
      if (maxCommute > 0 && p.commute_minutes != null && p.commute_minutes > maxCommute) return false;
      return true;
    });
  }

  // ── Sort ──────────────────────────────────────────────
  function _sortYield(p) {
    const ann      = getAnnotation(p.id);
    const items    = ann.renovation_items || [];
    const adjPrice = p.price + renoTotal(items);
    const leje     = effectiveLeje(p, ann);
    const ud       = getUdbetaling();
    const { ydelse } = computeLoan(adjPrice, ud);
    const ejerudgift = p.owner_costs_monthly ?? 0;
    return computeDisplayYield(getYieldType(), leje, ejerudgift, ydelse, adjPrice, ud, p);
  }

  function getSorted(rows) {
    return [...rows].sort((a,b) => {
      // Pinned items vises altid øverst
      const aPinned = getAnnotation(a.id).status === "pinned";
      const bPinned = getAnnotation(b.id).status === "pinned";
      if (aPinned !== bPinned) return aPinned ? -1 : 1;

      let av, bv;
      if (sortCol === "yield_v2_pct") {
        av = _sortYield(a); bv = _sortYield(b);
      } else {
        av=a[sortCol]; bv=b[sortCol];
      }
      if (typeof av==="string") av=av.toLowerCase();
      if (typeof bv==="string") bv=bv.toLowerCase();
      const nl=(av==null)-(bv==null);
      if (nl) return nl;
      if (av<bv) return sortDir==="asc"?-1:1;
      if (av>bv) return sortDir==="asc"?1:-1;
      return 0;
    });
  }

  // ── Render ────────────────────────────────────────────
  function renderTable() {
    const filtered = getFiltered();
    const sorted   = getSorted(filtered);
    document.getElementById("result-count").textContent = `${sorted.length} boliger`;
    if (typeof updateFilterBadge === "function") updateFilterBadge();

    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    if (sorted.length===0) {
      document.getElementById("prop-table").style.display="none";
      document.getElementById("empty").style.display="block";
      return;
    }
    document.getElementById("prop-table").style.display="";
    document.getElementById("empty").style.display="none";

    sorted.forEach(p => {
      const ann        = getAnnotation(p.id);
      const renoStatus = ann.renovation_status || "none";
      const items      = ann.renovation_items  || [];
      const total      = renoTotal(items);

      // Adresse
      const addrFull  = p.address || "–";
      const addrMatch = addrFull.match(/^(.+?),\s*(\d{4}\s+.+)$/);
      const street    = addrMatch ? addrMatch[1] : addrFull;
      const addrHtml  = p.listing_url
        ? `<a href="${esc(p.listing_url)}" target="_blank" rel="noopener">${esc(street)}</a>`
        : `<span style="font-weight:600;font-size:13px">${esc(street)}</span>`;
      const zipLink = p.zip_code
        ? `<a href="https://www.boligsiden.dk/postnummer/${esc(p.zip_code)}/solgte" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline dotted">${esc(p.zip_code)}</a>`
        : "";
      const locHtml = [zipLink, p.city ? esc(p.city) : ""].filter(Boolean).join("\u00a0");


      // Type + huslejeregler badge
      const icon    = TYPE_ICON[p.property_type] || "🏠";
      const typeDA  = TYPE_DA[p.property_type]   || esc(p.property_type||"–");
      const typeSub = [p.size_sqm!=null?p.size_sqm+"\u00a0m²":"", p.rooms!=null?p.rooms+"\u00a0rum":""].filter(Boolean).join("  ·  ");
      const unregBadge = isUnregulated(p) ? `<span class="unreg-badge" title="Ureguleret huslejeområde — markedsleje">U</span>` : "";

      // Energi
      const eLabel = p.energy_label ? p.energy_label.toUpperCase() : null;
      const energyHtml = eLabel ? `<span class="energy e-${eLabel}">${eLabel}</span>` : "–";

      // Basis- og justeret pris (custom_price = forhandlet pris)
      const hasCustomPrice = ann.custom_price && ann.custom_price > 0;
      const basePrice  = hasCustomPrice ? ann.custom_price : p.price;
      const adjPrice   = basePrice + total;

      // Finansiering
      const udbetaling = getUdbetaling();
      const { laan, ydelse, ratio } = computeLoan(adjPrice, udbetaling);
      const loanRisk = ratio > 0.80;

      // Totalpris — ny rækkefølge:
      // 1) Totalpris (primær) 2) Udbudspris + prisnedsættelse 3) Forhandlet pris 4) Renovering
      const sqmPris    = adjPrice > 0 && p.size_sqm > 0 ? Math.round(adjPrice / p.size_sqm) : null;
      const hasDrop    = p.price_change_count > 0 && p.price_change_amount < 0;
      const isModified = hasCustomPrice || total > 0;

      let priceInner;
      if (!isModified && !hasDrop) {
        // Simpel case: kun udbudspris
        priceInner = `<div class="price-main">${fmt(p.price)}\u00a0kr</div>`;
      } else {
        // Linje 1: Totalpris (stor, primær)
        priceInner = `<div class="price-main">${fmt(adjPrice)}\u00a0kr</div>`;
        // Linje 2: Udbudspris + prisnedsættelse
        const dropStr = hasDrop
          ? ` <span class="badge-pricedrop" title="${p.price_change_count} prisnedsættelse(r): ${fmt(Math.abs(p.price_change_amount))} kr">↓ ${Math.round(Math.abs(p.price_change_amount)/1000)}k</span>`
          : "";
        priceInner += `<div class="price-sub" style="color:var(--muted)">Udbud: ${fmt(p.price)}\u00a0kr${dropStr}</div>`;
        // Linje 3: Forhandlet pris (hvis sat)
        if (hasCustomPrice) {
          priceInner += `<div class="price-sub" style="color:#d97706">✏️ Bud: ${fmt(ann.custom_price)}\u00a0kr</div>`;
        }
        // Linje 4: Renoveringsomkostninger (hvis sat)
        if (total > 0) {
          priceInner += `<div class="price-sub" style="color:var(--blue)">🔨 +${fmt(total)}\u00a0kr reno</div>`;
        }
      }
      // Prisnedsættelse i simpel case
      if (!isModified && hasDrop) {
        const dropK = Math.round(Math.abs(p.price_change_amount) / 1000);
        priceInner += `<div class="badge-pricedrop" title="${fmt(Math.abs(p.price_change_amount))} kr">↓ ${dropK}k</div>`;
      }
      if (sqmPris) priceInner += `<div class="price-sub">${fmt(sqmPris)}\u00a0kr/m²</div>`;
      const priceHtml = `<button class="price-btn price-reno-${renoStatus}" data-reno-open="${p.id}" title="Klik for at estimere renovering">${priceInner}</button>`;

      // Finansieringskolonne
      const finHtml = `
        <div class="fin-laan ${loanRisk ? 'fin-risk' : 'fin-ok'}">${fmt(Math.round(laan))}\u00a0kr${loanRisk ? ' <span class="fin-warn" style="color:#94a3b8">⚠</span>' : ''}</div>
        <div class="fin-sub">${fmt(udbetaling)}\u00a0kr udbetaling</div>
      `;

      // Drift: ejerudgift + ydelse (forudberegn cashflow til farvelægning)
      const ejerudgift = p.owner_costs_monthly ?? 0;
      const samlet     = ejerudgift + Math.round(ydelse);
      const lejeForDrift = effectiveLeje(p, ann);
      const cashflowForDrift = lejeForDrift != null ? lejeForDrift - ejerudgift - Math.round(ydelse) : null;
      const driftRisk  = cashflowForDrift != null && cashflowForDrift < 0;
      const driftHtml  = p.owner_costs_monthly != null
        ? `<div class="price-main${driftRisk ? '" style="color:var(--risk)' : ''}">${fmt(samlet)}\u00a0kr</div>` +
          `<div class="price-sub">${fmt(ejerudgift)}\u00a0kr ejerudg.</div>` +
          `<div class="price-sub">${fmt(Math.round(ydelse))}\u00a0kr/md ydelse</div>`
        : `<div class="price-sub">${fmt(Math.round(ydelse))}\u00a0kr/md ydelse</div>`;

      // Est. leje + nettoleje + cashflow
      const leje = effectiveLeje(p, ann);
      const _lejeHtml = lejeHtml(p, ann);
      const nettoleje = leje != null ? leje - ejerudgift : null;
      const cashflow  = nettoleje != null ? nettoleje - ydelse : null;
      const cfSign    = cashflow != null && cashflow >= 0 ? "+" : "";
      const cfCls     = cashflow != null ? (cashflow >= 0 ? "cashflow-pos" : "cashflow-neg") : "";
      const cfHtml    = cashflow != null
        ? `<div class="${cfCls}">${cfSign}${fmt(Math.round(cashflow))}\u00a0kr/md</div>
           <div class="netto-sub">${fmt(Math.round(nettoleje))}\u00a0kr netto</div>`
        : "";

      // Afkast — baseret på valgt afkasttype
      const n    = p.lejedata_antal ?? 0;
      const nEff = ann.custom_leje ? 99 : (p.est_leje_v2 != null ? (p.lejedata_v2_antal ?? 0) : n);
      const thin = !ann.custom_leje && p.est_leje_v2 == null && p.yield_sqm_pct!=null && n>0 && n<MIN_N_RELIABLE;
      const yieldType = getYieldType();
      const yieldPct  = computeDisplayYield(yieldType, leje, ejerudgift, ydelse, adjPrice, udbetaling, p);
      const yCls      = yieldClass(yieldPct, nEff);
      // yTitle udgået — tooltip håndteres via mouseenter
      const yTxt      = yieldPct!=null ? (thin ? "~"+yieldPct.toFixed(1)+"%" : yieldPct.toFixed(1)+"%") : "–";

      // Køretid
      const driveTxt = fmtDuration(p.commute_minutes);
      const distHtml = `<span style="font-size:12px;color:var(--muted);margin-right:4px">${driveTxt}</span>`
                     + `<a class="dist-link" href="${mapsUrl(p.address)}" target="_blank" rel="noopener">🗺️</a>`;

      // Status-knap
      const statusIcon = ann.status==="disqualified" ? "❌" : ann.status==="pinned" ? "📌" : "⭐";
      const statusTitle = ann.status==="favorite"     ? "Favorit — klik for diskvalificer"
                        : ann.status==="disqualified" ? "Diskvalificeret — klik for pin"
                        : ann.status==="pinned"       ? "Pinned — klik for neutral"
                        : "Klik for favorit";
      const statusBtn  = `<button class="status-btn" data-status="${ann.status}" data-id="${p.id}" title="${statusTitle}">${statusIcon}</button>`;

      const tr = document.createElement("tr");
      if (ann.status==="disqualified") tr.classList.add("disqualified");
      if (ann.status==="pinned")       tr.classList.add("pinned");
      if (p.id === activeRowId)        tr.classList.add("active-row");

      tr.innerHTML = `
        <td style="text-align:center;padding:6px 4px">${statusBtn}</td>
        <td class="cell-addr">${addrHtml}<span class="loc">${locHtml}</span></td>
        <td class="cell-type"><span class="type-icon" title="${typeDA}" data-ann-id="${p.id}" data-default-title="${typeDA}">${icon}${unregBadge}</span><span class="type-sub">${esc(typeSub)}</span></td>
        <td class="num">${domCell(p.days_on_market)}</td>
        <td style="text-align:center">${energyHtml}</td>
        <td class="num">${priceHtml}</td>
        <td class="num">${finHtml}</td>
        <td class="num">${driftHtml}</td>
        <td class="num leje-cell">${_lejeHtml}</td>
        <td class="num">${cfHtml || '<span style="color:#cbd5e1">–</span>'}</td>
        <td class="num yield-cell ${yCls}" style="cursor:help">${yTxt}</td>
        <td class="num">${distHtml}</td>
      `;

      // Status klik
      tr.querySelector(".status-btn").addEventListener("click", e => {
        e.stopPropagation();
        cycleStatus(p.id);
      });

      // Leje: hover = tooltip, klik = override modal
      const lejeCell = tr.querySelector(".leje-cell");
      lejeCell.addEventListener("mouseenter", e => showTooltip(e, p));
      lejeCell.addEventListener("mouseleave", () => tooltip.classList.remove("visible"));
      lejeCell.addEventListener("click",      e => { e.stopPropagation(); tooltip.classList.remove("visible"); openLejeModal(p); });

      // Afkast: hover = tooltip med beregning
      const yieldCell = tr.querySelector(".yield-cell");
      yieldCell.addEventListener("mouseenter", e => {
        tooltip.innerHTML = buildYieldTooltip(p, ann, adjPrice, leje, ejerudgift, ydelse, udbetaling, yieldType, yieldPct);
        tooltip.classList.add("visible");
        positionTooltip(e);
      });
      yieldCell.addEventListener("mouseleave", () => tooltip.classList.remove("visible"));

      // Renoverings-modal åbn
      tr.querySelector("[data-reno-open]").addEventListener("click", e => {
        e.stopPropagation();
        openRenoModal(p);
      });

      // Klik på rækken (ikke på knapper/links) toggler aktiv-lås
      tr.addEventListener("click", e => {
        const tag = e.target.tagName;
        if (tag === "A" || tag === "BUTTON" || e.target.closest("button, a")) return;
        activeRowId = (activeRowId === p.id) ? null : p.id;
        renderTable();
      });

      tbody.appendChild(tr);
    });

    updateSortIndicators();
    renderCards(sorted);
  }

  // ── Kortvisning ───────────────────────────────────────
  function renderCards(sorted) {
    const container = document.getElementById("cards-container");
    container.innerHTML = "";
    sorted.forEach(p => {
      const ann        = getAnnotation(p.id);
      const renoStatus = ann.renovation_status || "none";
      const items      = ann.renovation_items  || [];
      const total      = renoTotal(items);

      // Adresse
      const addrFull  = p.address || "–";
      const addrMatch = addrFull.match(/^(.+?),\s*(\d{4}\s+.+)$/);
      const street    = addrMatch ? addrMatch[1] : addrFull;
      const cardZipLink = p.zip_code
        ? `<a href="https://www.boligsiden.dk/postnummer/${esc(p.zip_code)}/solgte" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline dotted">${esc(p.zip_code)}</a>`
        : "";
      const cardLocHtml = [cardZipLink, p.city ? esc(p.city) : ""].filter(Boolean).join("\u00a0");

      const cardDomSub  = (p.days_on_market != null && p.days_on_market >= 7)
        ? `<div class="dom-sub">${p.days_on_market}\u00a0dage på markedet</div>` : "";
      const addrLink  = p.listing_url
        ? `<a href="${esc(p.listing_url)}" target="_blank" rel="noopener">${esc(street)}</a>`
        : `<span style="font-weight:600;font-size:14px">${esc(street)}</span>`;

      // Energi
      const eLabel    = p.energy_label ? p.energy_label.toUpperCase() : null;
      const energyHtml = eLabel ? `<span class="energy e-${eLabel}">${eLabel}</span>` : "";

      // Type + størrelse + huslejeregler badge
      const icon    = TYPE_ICON[p.property_type] || "🏠";
      const typeSub = [p.size_sqm!=null?p.size_sqm+"\u00a0m²":"", p.rooms!=null?p.rooms+"\u00a0rum":""].filter(Boolean).join("  ·  ");
      const cardUnregBadge = isUnregulated(p) ? `<span class="unreg-badge" title="Ureguleret huslejeområde">U</span>` : "";

      // Basis- og justeret pris (custom_price = forhandlet pris)
      const cardHasCustomPrice = ann.custom_price && ann.custom_price > 0;
      const cardBasePrice = cardHasCustomPrice ? ann.custom_price : p.price;
      const adjPrice = cardBasePrice + total;

      // Pris
      let priceInner;
      if (cardHasCustomPrice) {
        priceInner = `<div class="price-adjusted">${fmt(p.price)}\u00a0kr</div>`
                   + `<div style="font-size:13px;font-weight:700;color:#d97706">${fmt(cardBasePrice)}\u00a0kr <span style="font-size:10px">✏️</span></div>`;
        if (total > 0) {
          priceInner += `<div class="price-renovated">${fmt(adjPrice)}\u00a0kr</div>`;
        }
      } else if (renoStatus === "none") {
        priceInner = `<div class="price-main">${fmt(p.price)}\u00a0kr</div>`;
      } else {
        priceInner = `<div class="price-adjusted">${fmt(p.price)}\u00a0kr</div>`
                   + `<div class="price-renovated">${fmt(adjPrice)}\u00a0kr</div>`;
      }
      if (p.price_change_count > 0 && p.price_change_amount < 0) {
        const dropK = Math.round(Math.abs(p.price_change_amount) / 1000);
        const times = p.price_change_count > 1 ? ` ×${p.price_change_count}` : "";
        priceInner += `<div class="badge-pricedrop" title="${p.price_change_count} prisnedsættelse(r) på i alt ${fmt(Math.abs(p.price_change_amount))} kr">↓ ${dropK}k${times}</div>`;
      }

      // Afkast (bruger effektiv leje)
      const cardN    = p.lejedata_antal ?? 0;
      const cardNEff = ann.custom_leje ? 99 : (p.est_leje_v2 != null ? (p.lejedata_v2_antal ?? 0) : cardN);
      const cardLeje = effectiveLeje(p, ann);
      let yieldPct;
      if (cardLeje != null && p.price > 0) {
        yieldPct = Math.round((cardLeje * 12 / adjPrice) * 1000) / 10;
      } else {
        yieldPct = p.yield_v2_pct ?? p.yield_sqm_pct;
      }
      const yCls = yieldClass(yieldPct, cardNEff);
      const thin = !ann.custom_leje && p.est_leje_v2 == null && yieldPct!=null && cardN>0 && cardN<MIN_N_RELIABLE;
      const yTxt = yieldPct!=null ? (thin?"~"+yieldPct.toFixed(1)+"%":yieldPct.toFixed(1)+"%") : "–";

      // Est. leje (bruger manuel override hvis sat)
      const lejeTxt = lejeHtml(p, ann);

      // Drift + cashflow til kort
      const cardUd       = getUdbetaling();
      const { laan: cardLaan, ydelse: cardYdelse, ratio: cardRatio } = computeLoan(adjPrice, cardUd);
      const cardEjerudgift = p.owner_costs_monthly ?? 0;
      const cardDriftSamlet = cardEjerudgift + Math.round(cardYdelse);
      const cardCashflow  = cardLeje != null ? cardLeje - cardEjerudgift - Math.round(cardYdelse) : null;
      const cardDriftRisk = cardCashflow != null && cardCashflow < 0;
      const cardDriftTxt  = p.owner_costs_monthly != null ? `${fmt(cardDriftSamlet)}\u00a0kr` : "–";
      const cardCfSign    = cardCashflow != null && cardCashflow >= 0 ? "+" : "";
      const cardCfCls     = cardCashflow != null ? (cardCashflow >= 0 ? "cashflow-pos" : "cashflow-neg") : "";
      const cardCfTxt     = cardCashflow != null ? `${cardCfSign}${fmt(Math.round(cardCashflow))}\u00a0kr/md` : "–";

      // Køretid (kort)
      const kmTxt = fmtDuration(p.commute_minutes);

      // Status-knap
      const cardStatusIcon = ann.status==="disqualified" ? "❌" : ann.status==="pinned" ? "📌" : "⭐";
      const statusBtn  = `<button class="status-btn" data-status="${ann.status}" data-id="${p.id}">${cardStatusIcon}</button>`;

      const card = document.createElement("div");
      card.className = "prop-card" + (ann.status==="disqualified" ? " disqualified" : "");
      if (ann.status==="pinned") card.style.cssText += "background:#fefce8;";
      card.innerHTML = `
        <div class="card-top">
          ${statusBtn}
          <div class="card-addr">
            ${addrLink}
            <span class="loc">${cardLocHtml}${cardUnregBadge}</span>
            ${cardDomSub}
          </div>
          ${energyHtml}
        </div>
        <div class="card-info">${icon} ${esc(typeSub)}</div>
        <div class="card-grid">
          <div class="card-cell">
            <div class="card-label">Totalpris</div>
            <button class="price-btn price-reno-${renoStatus} card-val" data-reno-open="${p.id}">${priceInner}</button>
          </div>
          <div class="card-cell">
            <div class="card-label">Afkast%</div>
            <div class="card-val ${yCls}">${yTxt}</div>
          </div>
          <div class="card-cell card-drift" style="cursor:pointer" title="Tap for udregning">
            <div class="card-label">Drift/md ℹ</div>
            <div class="card-val" style="font-size:13px;${cardDriftRisk ? 'color:var(--risk)' : ''}">${cardDriftTxt}</div>
          </div>
          <div class="card-cell">
            <div class="card-label">Køretid</div>
            <div class="card-val" style="font-size:13px">
              ${kmTxt}&nbsp;<a class="dist-link" href="${mapsUrl(p.address)}" target="_blank" rel="noopener" style="font-size:16px">🗺️</a>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <span class="leje-cell" style="cursor:pointer">${lejeTxt}&nbsp;<span style="font-size:10px;color:var(--muted)">est. leje/md</span></span>
          <span class="${cardCfCls}" style="font-size:13px;font-weight:700">${cardCfTxt}</span>
        </div>
      `;

      // Events
      card.querySelector(".status-btn").addEventListener("click", e => {
        e.stopPropagation(); cycleStatus(p.id);
      });
      card.querySelector("[data-reno-open]").addEventListener("click", e => {
        e.stopPropagation(); openRenoModal(p);
      });
      const lejeCell = card.querySelector(".leje-cell");
      if (lejeCell) lejeCell.addEventListener("click", e => { e.stopPropagation(); openLejeModal(p); });

      // Drift-celle: tap viser finansiering/drift/leje-breakdown
      const driftCell = card.querySelector(".card-drift");
      if (driftCell) driftCell.addEventListener("click", e => {
        e.stopPropagation();
        tooltip.innerHTML = buildDriftTooltip(p, adjPrice, cardLeje, cardEjerudgift, cardYdelse, cardUd, cardLaan, cardRatio);
        tooltip.classList.add("visible");
        positionTooltip(e);
      });

      container.appendChild(card);
    });
  }

  // ── Sort headers ──────────────────────────────────────
  // Dynamisk tooltip på type-ikon: viser manuelt satte attributter ved mouseover
  document.getElementById("table-body").addEventListener("mouseover", e => {
    const icon = e.target.closest("[data-ann-id]");
    if (!icon) return;
    const tip = buildAnnTooltip(parseInt(icon.dataset.annId));
    icon.title = tip || icon.dataset.defaultTitle || "";
  });

  function updateSortIndicators() {
    document.querySelectorAll("th[data-col]").forEach(th => {
      th.classList.remove("sort-asc","sort-desc");
      if (th.dataset.col===sortCol) th.classList.add(sortDir==="asc"?"sort-asc":"sort-desc");
    });
  }
  document.querySelectorAll("th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const defaultDir = th.dataset.defaultDir || "desc";
      sortDir = sortCol===th.dataset.col ? (sortDir==="asc"?"desc":"asc") : defaultDir;
      sortCol = th.dataset.col;
      renderTable();
    });
  });

  // ── Status-filter chips ───────────────────────────────
  document.querySelectorAll("[data-status-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-status-filter]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      statusFilter = btn.dataset.statusFilter;
      renderTable();
    });
  });

  // ── Filter listeners ──────────────────────────────────
  ["f-zip","f-maxprice","f-minyield","f-minrooms","f-maxrooms","f-minn","f-energy","f-maxcommute","f-yieldtype","f-laantype","f-unreg"]
    .forEach(id => document.getElementById(id).addEventListener("change", () => { renderTable(); updateFilterBadge(); }));
  ["f-zip","f-maxprice","f-minyield","f-minrooms","f-maxrooms","f-udbetaling"]
    .forEach(id => document.getElementById(id).addEventListener("input", () => { renderTable(); updateFilterBadge(); }));

  function doReset() {
    ["f-zip","f-maxprice","f-minyield","f-minrooms","f-maxrooms"].forEach(id => { document.getElementById(id).value=""; });
    document.getElementById("f-minn").value="5";
    document.getElementById("f-energy").value="D";
    document.getElementById("f-maxcommute").value="45";
    document.getElementById("f-udbetaling").value="300000";
    document.getElementById("f-yieldtype").value="finansieret";
    document.getElementById("f-unreg").value="";
    resetTypeChips();
    setDisqState(0);
    sortCol = "yield_v2_pct"; sortDir = "desc";
    document.getElementById("mobile-sort-select").value = "yield_v2_pct|desc";
    renderTable();
    updateFilterBadge();
  }

  function doShowAll() {
    ["f-zip","f-maxprice","f-minyield","f-minrooms","f-maxrooms"].forEach(id => { document.getElementById(id).value=""; });
    document.getElementById("f-minn").value="0";
    document.getElementById("f-energy").value="G";
    document.getElementById("f-maxcommute").value="";
    document.getElementById("f-udbetaling").value="300000";
    document.getElementById("f-yieldtype").value="finansieret";
    document.getElementById("f-unreg").value="";
    // Alle boligtyper aktive inkl. villalejlighed
    document.querySelectorAll(".type-chip").forEach(c => c.classList.add("active"));
    setDisqState(0);
    renderTable();
    updateFilterBadge();
  }

  // ── Diskvalificerede 3-state chip ────────────────────────
  // 0 = neutral (standard: skjuler diskvalificerede)
  // 1 = skjul diskvalificerede  (eksplicit skjul)
  // 2 = vis kun diskvalificerede
  let disqState = 0;
  const disqChip = document.getElementById("disq-chip");
  const DISQ_LABELS = ["❌ Diskvalificerede", "🙈 Skjul diskval.", "❌ Kun diskval."];
  function setDisqState(s) {
    disqState = s;
    disqChip.dataset.disqState = s;
    disqChip.textContent = DISQ_LABELS[s];
    disqChip.classList.toggle("active", s === 2);
    renderTable();
  }
  disqChip.addEventListener("click", () => setDisqState((disqState + 1) % 3));

  document.getElementById("reset-btn").addEventListener("click", doReset);
  document.getElementById("show-all-btn").addEventListener("click", doShowAll);

  // ── Mobil sort-bar ────────────────────────────────────
  document.getElementById("mobile-sort-select").addEventListener("change", e => {
    const [col, dir] = e.target.value.split("|");
    sortCol = col; sortDir = dir;
    renderTable();
  });

  // ── Mobil bottom sheet ─────────────────────────────────
  const filterSheet    = document.getElementById("filter-sheet");
  const filterBackdrop = document.getElementById("filter-backdrop");

  function openFilterSheet() {
    filterSheet.classList.add("open");
    filterBackdrop.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeFilterSheet() {
    filterSheet.classList.remove("open");
    filterBackdrop.classList.remove("open");
    document.body.style.overflow = "";
  }

  document.getElementById("mobile-filter-btn").addEventListener("click", openFilterSheet);
  document.getElementById("sheet-close-btn").addEventListener("click", closeFilterSheet);
  document.getElementById("sheet-done-btn").addEventListener("click", closeFilterSheet);
  filterBackdrop.addEventListener("click", closeFilterSheet);
  document.getElementById("sheet-reset-btn").addEventListener("click", () => { doReset(); });

  // Filter-badge: tæl aktive filtre (undtagen defaults)
  function countActiveFilters() {
    let n = 0;
    if (document.getElementById("f-zip").value.trim()) n++;
    const selTypes = getSelectedTypes();
    if (selTypes !== null) n++; // chips: null means "alle"
    if (document.getElementById("f-maxprice").value) n++;
    if (document.getElementById("f-minyield").value) n++;
    if (document.getElementById("f-minrooms").value) n++;
    if (document.getElementById("f-maxrooms").value) n++;
    const e = document.getElementById("f-energy").value;
    if (e && e !== "G" && e !== "D") n++;   // D er default, tæller ikke
    const mn = document.getElementById("f-minn").value;
    if (mn && mn !== "5") n++;              // 5 er default, tæller ikke
    const mc = document.getElementById("f-maxcommute").value;
    if (mc && mc !== "45") n++;             // 45 er default, tæller ikke
    return n;
  }

  function updateFilterBadge() {
    const n    = countActiveFilters();
    const btn  = document.getElementById("mobile-filter-btn");
    const done = document.getElementById("sheet-done-btn");
    const cnt  = document.getElementById("result-count").textContent;
    if (n > 0) {
      btn.classList.add("has-filters");
      btn.innerHTML = `⚙️ Filtre <span class="filter-badge-count">${n}</span>`;
    } else {
      btn.classList.remove("has-filters");
      btn.innerHTML = `⚙️ Filtre`;
    }
    if (done) done.textContent = cnt ? `Vis ${cnt}` : "Vis resultater";
  }

  // ── Renoverings-modal ─────────────────────────────────
  const modal       = document.getElementById("reno-modal");
  const modalTitle  = document.getElementById("modal-title");
  const modalAddr   = document.getElementById("modal-addr");
  const renoItemsEl = document.getElementById("reno-items");
  const renoSummary = document.getElementById("reno-summary");
  const notesInput  = document.getElementById("reno-notes-input");

  let _modalProp = null;

  function openRenoModal(p) {
    _modalProp       = p;
    modalPropId      = p.id;
    const ann        = getAnnotation(p.id);
    modalItems       = JSON.parse(JSON.stringify(ann.renovation_items || []));
    modalRenoStatus  = ann.renovation_status || "none";
    notesInput.value = ann.notes || "";

    // Forhandlet pris
    modalCustomPrice     = ann.custom_price     || null;
    modalCustomPriceNote = ann.custom_price_note || "";
    modalPriceMode       = (ann.custom_price && ann.custom_price > 0) ? "custom" : "original";
    document.getElementById("price-original-val").textContent = `Listepris: ${fmt(p.price)} kr`;
    document.getElementById("price-custom-input").value = modalCustomPrice || "";
    document.getElementById("price-custom-note").value  = modalCustomPriceNote;
    updatePriceTabs();

    const addrFull  = p.address || "–";
    const addrMatch = addrFull.match(/^(.+?),\s*(\d{4}\s+.+)$/);
    modalTitle.textContent = addrMatch ? addrMatch[1] : addrFull;
    modalAddr.textContent  = addrMatch ? addrMatch[2] : "";

    renderModalItems();
    updateRenoTabs();
    modal.classList.add("open");
  }

  function closeModal() {
    modal.classList.remove("open");
    _modalProp = null;
  }

  document.getElementById("modal-close-btn").addEventListener("click", closeModal);
  document.getElementById("modal-cancel-btn").addEventListener("click", closeModal);
  modal.addEventListener("click", e => { if (e.target===modal) closeModal(); });

  document.getElementById("modal-save-btn").addEventListener("click", async () => {
    await saveAnnotation(modalPropId, {
      renovation_items:  modalItems,
      renovation_status: modalRenoStatus,
      notes:             notesInput.value,
      custom_price:      modalPriceMode === "custom" ? modalCustomPrice : null,
      custom_price_note: modalPriceMode === "custom" ? modalCustomPriceNote : "",
    });
    closeModal();
    renderTable();
  });

  // Tabs
  document.querySelectorAll("[data-reno-status]").forEach(btn => {
    btn.addEventListener("click", () => {
      modalRenoStatus = btn.dataset.renoStatus;
      updateRenoTabs();
      renderModalSummary();
    });
  });

  function updateRenoTabs() {
    document.querySelectorAll("[data-reno-status]").forEach(btn => {
      btn.className = "reno-tab" + (btn.dataset.renoStatus===modalRenoStatus ? " active-"+modalRenoStatus : "");
    });
  }

  // Forhandlet pris tabs
  function updatePriceTabs() {
    document.querySelectorAll("[data-price-mode]").forEach(btn => {
      btn.className = "leje-tab-btn" + (btn.dataset.priceMode===modalPriceMode
        ? (modalPriceMode==="custom" ? " active-manual" : " active-auto") : "");
    });
    document.getElementById("price-custom-inputs").classList.toggle("visible", modalPriceMode === "custom");
  }
  document.querySelectorAll("[data-price-mode]").forEach(btn => {
    btn.addEventListener("click", () => {
      modalPriceMode = btn.dataset.priceMode;
      if (modalPriceMode === "original") { modalCustomPrice = null; modalCustomPriceNote = ""; }
      updatePriceTabs();
      renderModalSummary();
    });
  });
  document.getElementById("price-custom-input").addEventListener("input", e => {
    modalCustomPrice = parseFloat(e.target.value) || null;
    renderModalSummary();
  });
  document.getElementById("price-custom-note").addEventListener("input", e => {
    modalCustomPriceNote = e.target.value;
  });

  // ── Leje-override modal ───────────────────────────────
  const lejeModal    = document.getElementById("leje-modal");
  let _lejeProp      = null;

  function openLejeModal(p) {
    _lejeProp = p;
    const ann = getAnnotation(p.id);
    modalLejeMode       = ann.custom_leje ? "manual" : "auto";
    modalCustomLeje     = ann.custom_leje || null;
    modalCustomLejeNote = ann.custom_leje_note || "";

    // Adresse
    const addrFull  = p.address || "–";
    const addrMatch = addrFull.match(/^(.+?),\s*(\d{4}\s+.+)$/);
    document.getElementById("leje-modal-title").textContent = addrMatch ? addrMatch[1] : addrFull;
    document.getElementById("leje-modal-addr").textContent  = addrMatch ? addrMatch[2] : "";

    // System-estimat boks
    const n    = p.lejedata_antal    ?? 0;
    const nV2  = p.lejedata_v2_antal ?? 0;
    const nRum = p.lejedata_rum_antal ?? 0;
    let box = "";

    // V2-model — primær
    if (p.est_leje_v2 != null) {
      const v2Warn = nV2 === 0
        ? `<div style="color:#d97706;font-size:11px;margin-top:4px">⚠️ National fallback — ingen zip-data for ${p.zip_code}</div>`
        : (nV2 < MIN_N_RELIABLE ? `<div style="color:#d97706;font-size:11px;margin-top:4px">⚠️ Kun ${nV2} datapunkter — usikkert</div>` : "");
      box += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">⭐ V2-model (4252 + b·m²) — ${p.zip_code}</div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:14px;padding:2px 0"><span>Estimat</span><span style="font-weight:700;color:#2563eb">${fmtKr(p.est_leje_v2)}</span></div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:2px 0"><span>Datapunkter (V2)</span><span>${nV2}</span></div>`;
      box += v2Warn;
      box += `<div style="border-top:1px solid var(--border);margin:8px 0"></div>`;
    }
    // m²-metode
    if (p.est_leje_sqm != null) {
      const warn = n < MIN_N_RELIABLE ? `<div style="color:#d97706;font-size:11px;margin-top:4px">⚠️ Kun ${n} datapunkter</div>` : "";
      box += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">m²-metode (${p.zip_code})</div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:1px 0"><span>Lav</span><span>${fmtKr(p.est_leje_sqm_low)}</span></div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:1px 0"><span>Median</span><span style="font-weight:700">${fmtKr(p.est_leje_sqm)}</span></div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:1px 0"><span>Høj</span><span>${fmtKr(p.est_leje_sqm_high)}</span></div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:1px 0"><span>Datapunkter</span><span>${n}</span></div>`;
      box += warn;
    }
    // Rum-metode
    if (p.est_leje_rooms != null) {
      box += `<div style="border-top:1px solid var(--border);margin:8px 0"></div>`;
      box += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Rum-metode (${p.rooms ?? "?"}-rums i ${p.zip_code})</div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:1px 0"><span>Lav</span><span>${fmtKr(p.est_leje_rooms_low)}</span></div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:1px 0"><span>Median</span><span style="font-weight:700">${fmtKr(p.est_leje_rooms)}</span></div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:1px 0"><span>Høj</span><span>${fmtKr(p.est_leje_rooms_high)}</span></div>`;
      box += `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:1px 0"><span>Datapunkter</span><span>${nRum}</span></div>`;
    }
    if (!box) box = `<div style="color:var(--muted);font-size:13px">Ingen systemestimering tilgængelig.</div>`;
    document.getElementById("leje-system-box").innerHTML = box;

    // Google Sheets-link (vises kun hvis Apps Script URL er konfigureret)
    const sheetsLink = document.getElementById("leje-sheets-link");
    if (SHEETS_SCRIPT_URL) {
      const params = new URLSearchParams({ zip: p.zip_code || "", rooms: p.rooms || "" });
      sheetsLink.href = SHEETS_SCRIPT_URL + "?" + params.toString();
      sheetsLink.style.display = "inline";
    } else {
      sheetsLink.style.display = "none";
    }

    // Inputs
    document.getElementById("leje-custom-input").value = modalCustomLeje || "";
    document.getElementById("leje-custom-note").value  = modalCustomLejeNote;
    updateLejeTabs();
    lejeModal.classList.add("open");
  }

  function closeLejeModal() {
    lejeModal.classList.remove("open");
    _lejeProp = null;
  }

  function updateLejeTabs() {
    document.querySelectorAll("[data-leje-mode]").forEach(btn => {
      btn.className = "leje-tab-btn" + (btn.dataset.lejeMode===modalLejeMode ? " active-"+modalLejeMode : "");
    });
    document.getElementById("leje-manual-inputs").classList.toggle("visible", modalLejeMode === "manual");
  }

  document.getElementById("leje-modal-close").addEventListener("click",  closeLejeModal);
  document.getElementById("leje-modal-cancel").addEventListener("click", closeLejeModal);
  lejeModal.addEventListener("click", e => { if (e.target===lejeModal) closeLejeModal(); });

  document.querySelectorAll("[data-leje-mode]").forEach(btn => {
    btn.addEventListener("click", () => {
      modalLejeMode = btn.dataset.lejeMode;
      if (modalLejeMode === "auto") { modalCustomLeje = null; modalCustomLejeNote = ""; }
      updateLejeTabs();
    });
  });
  document.getElementById("leje-custom-input").addEventListener("input", e => {
    modalCustomLeje = parseFloat(e.target.value) || null;
  });
  document.getElementById("leje-custom-note").addEventListener("input", e => {
    modalCustomLejeNote = e.target.value;
  });

  document.getElementById("leje-modal-save").addEventListener("click", async () => {
    if (!_lejeProp) return;
    await saveAnnotation(_lejeProp.id, {
      custom_leje:      modalLejeMode === "manual" ? modalCustomLeje : null,
      custom_leje_note: modalLejeMode === "manual" ? modalCustomLejeNote : "",
    });
    closeLejeModal();
    renderTable();
  });

  // Tilføj post
  document.getElementById("add-item-btn").addEventListener("click", () => {
    // Sæt automatisk "Under beregning" når første post tilføjes
    if (modalItems.length === 0 && modalRenoStatus === "none") {
      modalRenoStatus = "progress";
      document.querySelectorAll(".reno-status-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.status === "progress");
      });
    }
    modalItems.push({ desc:"", cost:"" });
    renderModalItems();
  });

  function renderModalItems() {
    renoItemsEl.innerHTML = "";
    modalItems.forEach((item, i) => {
      const row = document.createElement("div");
      row.className = "reno-item";
      row.innerHTML = `
        <input type="text"   class="desc-inp" placeholder="Beskrivelse (fx tag, varmepumpe)" value="${esc(item.desc)}">
        <input type="number" class="cost-inp" placeholder="Beløb (kr)" value="${item.cost||""}" step="5000">
        <button class="del-btn" title="Fjern">✕</button>
      `;
      row.querySelector(".desc-inp").addEventListener("input", e => { modalItems[i].desc = e.target.value; renderModalSummary(); });
      row.querySelector(".cost-inp").addEventListener("input", e => { modalItems[i].cost = parseFloat(e.target.value)||0; renderModalSummary(); });
      row.querySelector(".del-btn").addEventListener("click",  () => { modalItems.splice(i,1); renderModalItems(); });
      renoItemsEl.appendChild(row);
    });
    renderModalSummary();
  }

  function renderModalSummary() {
    if (!_modalProp) return;
    const p         = _modalProp;
    const total     = renoTotal(modalItems);
    const basePrice = (modalPriceMode === "custom" && modalCustomPrice > 0) ? modalCustomPrice : p.price;
    const adjPrice  = basePrice + total;
    // Effektiv leje: manuel > V2 > m²
    const leje = (modalLejeMode === "manual" && modalCustomLeje > 0)
                 ? modalCustomLeje : (p.est_leje_v2 ?? p.est_leje_sqm);
    const adjYield = leje!=null && adjPrice>0 ? (leje*12/adjPrice*100).toFixed(1) : null;

    const priceRow = modalPriceMode === "custom" && modalCustomPrice > 0
      ? `<div class="reno-summary-row" style="color:var(--muted)"><span>Listepris</span><span style="text-decoration:line-through">${fmt(p.price)} kr</span></div>
         <div class="reno-summary-row" style="color:#d97706"><span>✏️ Forhandlet</span><span>${fmt(modalCustomPrice)} kr</span></div>`
      : `<div class="reno-summary-row"><span>Kontantpris</span><span>${fmt(p.price)} kr</span></div>`;

    const lejeRow = modalLejeMode === "manual" && modalCustomLeje > 0
      ? `<div class="reno-summary-row" style="color:#d97706">
           <span>✏️ Manuel leje</span><span>${fmt(modalCustomLeje)} kr/md</span>
         </div>`
      : (leje!=null
          ? `<div class="reno-summary-row" style="color:var(--muted)">
               <span>Est. leje (V2/m²)</span><span>${fmt(leje)} kr/md</span>
             </div>` : "");

    renoSummary.innerHTML = `
      ${priceRow}
      ${modalItems.filter(it=>it.cost>0).map(it =>
        `<div class="reno-summary-row" style="color:var(--muted)"><span>+ ${esc(it.desc||"Post")}</span><span>${fmt(it.cost)} kr</span></div>`
      ).join("")}
      ${(total>0 || (modalPriceMode==="custom" && modalCustomPrice>0))
        ? `<div class="reno-summary-row total"><span>Justeret pris</span><span>${fmt(adjPrice)} kr</span></div>` : ""}
      ${lejeRow}
      <div class="reno-summary-row total" style="margin-top:6px">
        <span>Afkast (brutto)</span>
        <span class="${adjYield!=null && parseFloat(adjYield)>=6 ? "yield-high" : adjYield!=null && parseFloat(adjYield)>=4 ? "yield-mid" : "yield-low"}">${adjYield!=null ? adjYield+"%" : "–"}</span>
      </div>
    `;
  }

  // ── Boot ──────────────────────────────────────────────
  if (getApiKey()) {
    loadData();
  } else {
    showPasswordPrompt(loadData);
  }
</script>
</body>
</html>
