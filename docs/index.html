<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejendomsinvestering — 2026-04-23</title>
  <style>
    :root {
      --green:  #15803d;   /* green-700 — dæmpet (var #16a34a) */
      --yellow: #ca8a04;   /* amber-600 */
      --red:    #dc2626;
      --risk:   #92400e;   /* dæmpet rød-brun — bruges til risikomarkering overalt */
      --blue:   #2563eb;
      --bg:     #f8fafc;
      --card:   #ffffff;
      --border: #e2e8f0;
      --text:   #1e293b;
      --muted:  #64748b;
      --accent: #0f172a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px;
      display: flex; flex-direction: column; height: 100dvh;
    }

    /* ── Header ── */
    header {
      background: var(--accent); color: #fff;
      padding: 12px 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    #meta-info { font-size: 11px; color: #94a3b8; text-align: right; line-height: 1.5; }

    /* ── Filter panel ── */
    #filter-panel {
      background: var(--card); border-bottom: 2px solid var(--border);
      padding: 12px 16px 10px; flex-shrink: 0;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .filter-group { display: flex; flex-direction: column; gap: 3px; }
    .filter-group label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .filter-group input, .filter-group select {
      padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; background: var(--bg); color: var(--text); width: 100%;
    }
    .filter-group input:focus, .filter-group select:focus {
      outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px #2563eb22;
    }
    .filter-bar { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
    #reset-btn {
      padding: 5px 12px; background: var(--accent); color: #fff;
      border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    #reset-btn:hover { opacity: 0.82; }
    #show-all-btn {
      padding: 5px 12px; background: #fff; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    #show-all-btn:hover { background: #f0f9ff; }
    #result-count { font-size: 12px; color: var(--muted); }

    /* Status-filter chips */
    .chip-group { display: flex; gap: 4px; }
    .chip {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg); color: var(--muted);
      white-space: nowrap; transition: all .15s;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Table wrapper ── */
    #table-wrapper { overflow-x: auto; overflow-y: auto; flex: 1 1 auto; }
    table { width: 100%; border-collapse: collapse; min-width: 960px; }
    thead { background: #f1f5f9; position: sticky; top: 0; z-index: 100; }
    th {
      padding: 8px 10px; text-align: left;
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    th:hover { color: var(--text); }
    th .si { display: inline-block; width: 10px; margin-left: 2px; color: #94a3b8; }
    th.sort-asc  .si::after { content: "↑"; color: var(--blue); }
    th.sort-desc .si::after { content: "↓"; color: var(--blue); }
    th:not(.sort-asc):not(.sort-desc) .si::after { content: "⇅"; }

    td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: #f1f5f9; }

    /* Diskvalificeret — nedtonet */
    tr.disqualified td { opacity: 0.38; }
    tr.disqualified .cell-addr a { text-decoration: line-through; color: var(--muted); }

    /* Pinned — subtil highlight */
    tr.pinned td { background: #fefce8; }
    tr.pinned:hover td { background: #fef9c3; }

    /* Aktiv række — blå venstrekant, låst i visning */
    tr.active-row td { background: #f0f9ff; }
    tr.active-row td:first-child { border-left: 3px solid var(--blue); }
    tr.active-row:hover td { background: #e0f2fe; }

    /* ── Status-knap ── */
    .status-btn {
      font-size: 18px; background: none; border: none; cursor: pointer;
      padding: 2px; border-radius: 4px; line-height: 1;
      transition: transform .1s;
    }
    .status-btn:hover { transform: scale(1.25); }
    .status-btn[data-status="neutral"]      { opacity: 0.25; }
    .status-btn[data-status="favorite"]     { opacity: 1; }
    .status-btn[data-status="disqualified"] { opacity: 1; }
    .status-btn[data-status="pinned"]       { opacity: 1; }

    /* ── Adresse ── */
    .cell-addr { max-width: 190px; }
    .cell-addr a {
      font-weight: 600; font-size: 13px; color: var(--blue);
      text-decoration: none; display: block; line-height: 1.3;
    }
    .cell-addr a:hover { text-decoration: underline; }
    .cell-addr .loc { font-size: 11px; color: var(--muted); margin-top: 1px; display: block; }
    /* Zip-link i loc: inline (ikke block) + arver loc-størrelse */
    .cell-addr .loc a { display: inline; font-size: inherit; font-weight: inherit; color: inherit; }
    .cell-addr .loc a:hover { text-decoration: underline dotted; }

    /* ── Boligtype multi-select chips ── */
    .type-chip-group { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px; }
    .type-chip {
      padding: 3px 7px; border-radius: 12px; font-size: 11px; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg); color: var(--muted);
      white-space: nowrap; transition: all .15s; line-height: 1.5;
    }
    .type-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Type ── */
    .cell-type { white-space: nowrap; }
    .type-icon { font-size: 18px; display: block; line-height: 1; margin-bottom: 2px; }
    .type-sub  { font-size: 10px; color: var(--muted); line-height: 1.4; }

    /* ── Energi ── */
    .energy {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 5px;
      font-size: 11px; font-weight: 800; color: #fff;
    }
    .e-A { background: #15803d; } .e-B { background: #65a30d; }
    .e-C { background: #ca8a04; } .e-D { background: #ea580c; }
    .e-E { background: #dc2626; } .e-F { background: #9f1239; }
    .e-G { background: #581c87; }

    /* ── Badges: Ny, prisnedsættelse ── */
    .badge-ny { display:inline-block; font-size:10px; font-weight:700; color:#fff;
                background:var(--green); border-radius:3px; padding:1px 4px; margin-left:4px; vertical-align:middle; }
    .badge-pricedrop { font-size:11px; color:#d97706; font-weight:600; }
    .dom-sub { font-size:11px; color:var(--muted); }

    /* ── Priser ── */
    .num { text-align: right; white-space: nowrap; }
    .price-main { font-weight: 600; font-size: 13px; }
    .price-sub  { font-size: 11px; color: var(--muted); }

    /* Totalpris — renoveringsstatus-farver */
    .price-btn {
      background: none; border: none; cursor: pointer; padding: 0;
      font: inherit; text-align: right;
    }
    .price-reno-none     .price-main { color: #374151; }
    .price-reno-progress .price-main { color: var(--blue); }
    .price-reno-done     .price-main { color: var(--green); }
    .price-adjusted { font-size: 11px; color: var(--muted); text-decoration: line-through; }
    .price-renovated { font-size: 13px; font-weight: 700; }
    .price-reno-progress .price-renovated { color: var(--blue); }
    .price-reno-done     .price-renovated { color: var(--green); }

    /* ── Finansiering ── */
    .fin-laan   { font-weight: 600; font-size: 13px; }
    .fin-risk   { color: var(--risk); }
    .fin-ok     { color: #374151; }
    .fin-sub    { font-size: 11px; color: var(--muted); }
    .fin-warn   { font-size: 10px; }

    /* ── Cashflow ── */
    .cashflow-pos { color: var(--green); font-weight: 700; font-size: 13px; }
    .cashflow-neg { color: var(--risk); font-weight: 700; font-size: 13px; }
    .netto-sub    { font-size: 11px; color: var(--muted); }

    /* ── Est. leje ── */
    .leje-cell { position: relative; cursor: pointer; }
    .leje-val  { font-weight: 600; text-decoration: underline dotted var(--muted); }
    .leje-empty { color: #cbd5e1; }
    /* Manuel leje-override */
    .leje-override { font-weight: 600; color: #d97706; }
    .leje-override-icon { font-size: 10px; margin-left: 2px; }

    /* ── Afkast ── */
    .yield-high { color: var(--green); font-weight: 700; font-size: 14px; }
    .yield-mid  { color: var(--yellow); font-weight: 700; font-size: 14px; }
    .yield-low  { color: var(--risk); font-weight: 600; font-size: 14px; }
    .yield-none { color: #cbd5e1; font-size: 13px; }
    .leje-tag   { font-size: 9px; font-weight: 700; color: #60a5fa; background: rgba(96,165,250,.15);
                  border-radius: 3px; padding: 1px 3px; margin-left: 4px; vertical-align: middle;
                  letter-spacing: .03em; }
    .yield-thin {
      color: #94a3b8; font-size: 13px; font-weight: 400;
      text-decoration: underline dotted #94a3b8; cursor: help;
    }

    /* ── Ureguleret huslejeindikator ── */
    .unreg-badge {
      display: inline-block; background: #dcfce7; color: #15803d;
      font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 3px;
      margin-left: 3px; vertical-align: middle; letter-spacing: .04em;
      text-transform: uppercase; cursor: default;
    }

    /* ── Afstand ── */
    .dist-link { font-size: 18px; text-decoration: none; opacity: 0.7; }
    .dist-link:hover { opacity: 1; }

    /* ── Tooltip ── */
    .tooltip {
      display: none; position: fixed; z-index: 9999;
      background: var(--accent); color: #fff;
      padding: 10px 13px; border-radius: 8px; font-size: 12px; line-height: 1.7;
      min-width: 220px; max-width: 280px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3); pointer-events: none;
    }
    .tooltip.visible { display: block; }
    .tooltip-title  { font-weight: 700; margin-bottom: 4px; font-size: 12px; }
    .tooltip-row    { display: flex; justify-content: space-between; gap: 16px; }
    .tooltip-row span:last-child { font-weight: 600; }
    .tooltip-divider { border-top: 1px solid #334155; margin: 6px 0; }
    .tooltip-warn   { color: #fbbf24; font-size: 11px; margin-top: 4px; }

    /* ── Renoveringsmodal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 1000;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 12px;
      width: 100%; max-width: 520px; max-height: 90vh;
      display: flex; flex-direction: column;  /* sticky footer */
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal-header {
      padding: 16px 20px 12px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    }
    .modal-header h2 { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .modal-header .addr-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .modal-close {
      font-size: 20px; background: none; border: none; cursor: pointer;
      color: var(--muted); flex-shrink: 0; line-height: 1; padding: 2px;
    }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1 1 auto; }

    /* Status-tabs i modal */
    .reno-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .reno-tab {
      flex: 1; padding: 7px 4px; border-radius: 8px; border: 2px solid var(--border);
      font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
      background: var(--bg); color: var(--muted); transition: all .15s;
    }
    .reno-tab.active-none     { border-color: #374151; color: #374151; background: #f1f5f9; }
    .reno-tab.active-progress { border-color: var(--blue); color: var(--blue); background: #eff6ff; }
    .reno-tab.active-done     { border-color: var(--green); color: var(--green); background: #f0fdf4; }

    /* Renoverings-poster */
    .reno-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .reno-item {
      display: grid; grid-template-columns: 1fr 120px 32px;
      gap: 6px; align-items: center;
    }
    .reno-item input {
      padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; width: 100%;
    }
    .reno-item input:focus { outline: none; border-color: var(--blue); }
    .reno-item .del-btn {
      width: 28px; height: 28px; border-radius: 6px;
      background: #fee2e2; border: none; cursor: pointer;
      color: var(--red); font-size: 14px; display: flex;
      align-items: center; justify-content: center;
    }
    .add-item-btn {
      width: 100%; padding: 8px; border: 1px dashed var(--border);
      border-radius: 8px; background: none; cursor: pointer;
      color: var(--muted); font-size: 13px; margin-bottom: 16px;
    }
    .add-item-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* Leje-override sektion */
    .leje-section {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; margin-bottom: 14px;
    }
    .leje-section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .leje-section-header label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .leje-toggle { display: flex; gap: 4px; }
    .leje-tab-btn {
      padding: 4px 10px; border-radius: 6px; border: 1.5px solid var(--border);
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: var(--bg); color: var(--muted); transition: all .15s;
    }
    .leje-tab-btn.active-auto     { border-color: var(--muted); color: var(--text); background: #f1f5f9; }
    .leje-tab-btn.active-manual   { border-color: #d97706; color: #d97706; background: #fffbeb; }
    .leje-manual-inputs { display: none; flex-direction: column; gap: 8px; }
    .leje-manual-inputs.visible { display: flex; }
    .leje-manual-inputs input {
      padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; width: 100%;
    }
    .leje-manual-inputs input:focus { outline: none; border-color: #d97706; }
    .leje-system-val { font-size: 13px; color: var(--muted); }

    /* Renoveringsopsummering */
    .reno-summary {
      background: #f8fafc; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
    }
    .reno-summary-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 2px 0;
    }
    .reno-summary-row.total { font-weight: 700; border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; }
    .reno-summary-row.yield-row { color: var(--green); font-weight: 700; }

    /* Notes */
    .reno-notes {
      margin-top: 12px;
    }
    .reno-notes label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
    .reno-notes textarea {
      width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px;
    }
    .reno-notes textarea:focus { outline: none; border-color: var(--blue); }

    .modal-footer {
      padding: 12px 20px; flex-shrink: 0;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .btn-save {
      padding: 8px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-cancel {
      padding: 8px 16px; background: var(--bg); color: var(--muted);
      border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer;
    }

    /* ── Kortvisning (mobil) ── */
    #mobile-sort-bar {
      display: none; align-items: center; gap: 8px;
      padding: 6px 12px; font-size: 12px; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    #mobile-sort-bar select {
      font-size: 12px; border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 6px; background: #fff; color: var(--text);
    }
    #cards-container { display: none; padding: 8px; }

    .prop-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    }
    .prop-card.disqualified { opacity: 0.45; padding: 8px 14px; }
    .prop-card.disqualified .card-addr a { text-decoration: line-through; color: var(--muted); }
    .prop-card.disqualified .card-info,
    .prop-card.disqualified .card-grid,
    .prop-card.disqualified .card-footer { display: none; }

    .card-top {
      display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px;
    }
    .card-top .status-btn { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
    .card-addr { flex: 1; min-width: 0; }
    .card-addr a {
      font-weight: 600; font-size: 14px; color: var(--blue);
      text-decoration: none; display: block;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-addr .loc { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }

    .card-info {
      font-size: 12px; color: var(--muted);
      margin: 2px 0 10px 30px;
    }

    .card-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 10px;
    }
    .card-cell {
      background: var(--bg); border-radius: 8px; padding: 8px 10px;
    }
    .card-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px;
    }
    .card-val { font-size: 14px; font-weight: 600; }
    .card-val.price-btn { padding: 0; text-align: left; }

    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid var(--border); padding-top: 8px;
    }

    @media (max-width: 700px) {
      #prop-table     { display: none !important; }
      #cards-container { display: block; }
      #mobile-sort-bar { display: flex; }
    }

    /* ── Loading / empty ── */
    #loading, #empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile filter button ── */
    .mobile-filter-btn {
      display: none; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--bg);
      font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text);
      white-space: nowrap; flex-shrink: 0;
    }
    .mobile-filter-btn.has-filters { border-color: var(--blue); color: var(--blue); background: #eff6ff; }
    .filter-badge-count {
      background: var(--blue); color: #fff; border-radius: 10px;
      font-size: 10px; font-weight: 800; padding: 1px 6px;
    }

    /* ── Sheet-only elementer (skjult på desktop) ── */
    .sheet-topbar, .sheet-actions { display: none; }

    /* ── Backdrop ── */
    #filter-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 599;
    }
    #filter-backdrop.open { display: block; }

    /* ── Desktop: lille skærm (tablet) ── */
    @media (max-width: 900px) {
      .filter-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }

    /* ── Mobil: bottom sheet ── */
    @media (max-width: 700px) {
      header h1 { font-size: 13px; }

      /* Kompakt filterpanel – kun baren er synlig */
      #filter-panel { padding: 8px 12px; }

      /* Skjul desktop-elementerne */
      .filter-grid { display: none !important; }
      #reset-btn   { display: none; }

      /* Vis mobilknap */
      .mobile-filter-btn { display: flex; }

      /* Bottom sheet – ligger fast nede fra bunden */
      #filter-sheet {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
        background: var(--card); border-radius: 18px 18px 0 0;
        box-shadow: 0 -6px 40px rgba(0,0,0,.18);
        transform: translateY(100%);
        transition: transform .3s cubic-bezier(.4,0,.2,1);
        max-height: 88vh; display: flex; flex-direction: column;
      }
      #filter-sheet.open { transform: translateY(0); }

      /* Sheet-header */
      .sheet-topbar {
        display: block; flex-shrink: 0;

<header>
  <h1>🏠 Ejendomsinvestering</h1>
  <div id="meta-info">Indlæser…</div>
</header>

<div id="filter-panel">
  <!-- Filter-sheet: desktop = inline grid, mobil = bottom sheet -->
  <div id="filter-sheet">
    <!-- Topbar kun synlig på mobil -->
    <div class="sheet-topbar">
      <div class="sheet-handle"></div>
      <div class="sheet-title-row">
        <b>Filtre</b>
        <button class="sheet-close-btn" id="sheet-close-btn">✕</button>
      </div>
    </div>
    <!-- Selve filter-inputs -->
    <div class="filter-grid">
      <div class="filter-group">
        <label>Postnummer</label>
        <input type="text" id="f-zip" placeholder="3300, 4200…">
      </div>
      <div class="filter-group" style="grid-column: span 2">
        <label>Boligtype</label>
        <div id="f-type-chips" class="type-chip-group"></div>
      </div>
      <div class="filter-group">
        <label>Maks. pris (kr)</label>
        <input type="number" id="f-maxprice" placeholder="2.500.000" step="50000">
      </div>
      <div class="filter-group">
        <label>Min. afkast %</label>
        <input type="number" id="f-minyield" placeholder="5" step="0.5" min="0" max="30">
      </div>
      <div class="filter-group">
        <label>Udbetaling (kr)</label>
        <input type="number" id="f-udbetaling" value="300000" step="25000" min="0">
      </div>
      <div class="filter-group">
        <label>Afkasttype</label>
        <select id="f-yieldtype">
          <option value="finansieret" selected>Finansieret</option>
          <option value="teoretisk">Teoretisk (brutto)</option>
          <option value="kontant">Afkast på kontantindsats</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Lånetype</label>
        <select id="f-laantype">
          <option value="realkredit">Realkredit 4%</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Min. rum</label>
        <input type="number" id="f-minrooms" placeholder="1" min="1" max="10">
      </div>
      <div class="filter-group">
        <label>Max. rum</label>
        <input type="number" id="f-maxrooms" placeholder="10" min="1" max="10">
      </div>
      <div class="filter-group">
        <label>Energimærke (maks.)</label>
        <select id="f-energy">
          <option value="">Alle mærker</option>
          <option value="A">A (kun A)</option>
          <option value="B">B (A–B)</option>
          <option value="C">C (A–C)</option>
          <option value="D" selected>D (A–D)</option>
          <option value="E">E (A–E)</option>
          <option value="F">F (A–F)</option>
          <option value="G">G (alle)</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Maks. køretid</label>
        <select id="f-maxcommute">
          <option value="">Alle</option>
          <option value="20">Max 20 min</option>
          <option value="25">Max 25 min</option>
          <option value="30">Max 30 min</option>
          <option value="35">Max 35 min</option>
          <option value="40">Max 40 min</option>
          <option value="45" selected>Max 45 min</option>
          <option value="50">Max 50 min</option>
          <option value="55">Max 55 min</option>
          <option value="60">Max 60 min</option>
          <option value="70">Max 70 min</option>
          <option value="80">Max 80 min</option>
          <option value="90">Max 90 min</option>
          <option value="105">Max 105 min</option>
          <option value="120">Max 120 min</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Lejedata (min. n)</label>
        <select id="f-minn">
          <option value="0">Alle (inkl. tynde)</option>
          <option value="5" selected>≥ 5 annoncer</option>
          <option value="10">≥ 10 annoncer</option>
          <option value="20">≥ 20 annoncer</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Huslejeregler</label>
        <select id="f-unreg">
          <option value="">Alle</option>
          <option value="1">Kun uregulerede</option>
        </select>
      </div>
    </div>
    <!-- Footer kun synlig på mobil -->
    <div class="sheet-actions">
      <button class="sheet-reset-btn" id="sheet-reset-btn">Nulstil</button>
      <button class="sheet-done-btn" id="sheet-done-btn">Vis resultater</button>
    </div>
  </div>

  <!-- Altid synlig bar (desktop: under grid, mobil: eneste synlige del) -->
  <div class="filter-bar">
    <button class="mobile-filter-btn" id="mobile-filter-btn">⚙️ Filtre</button>
    <button id="reset-btn">Nulstil</button>
    <button id="show-all-btn">Vis alle</button>
    <div class="chip-group">
      <button class="chip active" data-status-filter="all">Alle</button>
      <button class="chip" data-status-filter="favorite">⭐ Favoritter</button>
      <button class="chip" data-status-filter="pinned">📌 Pinned</button>
      <button class="chip" id="disq-chip" data-disq-state="0">❌ Diskvalificerede</button>
      <button class="chip" data-status-filter="edited">✏️ Redigerede</button>
    </div>
    <span id="result-count"></span>
  </div>
</div>

<!-- Backdrop til bottom sheet -->
<div id="filter-backdrop"></div>

<div id="table-wrapper">
  <div id="loading"><div class="spinner"></div><br>Henter ejendomsdata…</div>
  <div id="empty" style="display:none">Ingen boliger matcher filteret.</div>
  <table id="prop-table" style="display:none">
    <thead>
      <tr>
        <th style="width:36px"></th>
        <th data-col="address">Adresse <span class="si"></span></th>

        <th data-col="owner_costs_monthly" class="num">Drift <span class="si"></span></th>
        <th data-col="est_leje_sqm" class="num">Leje/md <span class="si"></span></th>
        <th class="num">Cashflow</th>
        <th data-col="yield_v2_pct" class="num sort-desc">Afkast% <span class="si"></span></th>
        <th data-col="commute_minutes" class="num">Køretid <span class="si"></span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div id="mobile-sort-bar">
    Sorter:
    <select id="mobile-sort-select">
      <option value="yield_v2_pct|desc">Afkast% ↓</option>
      <option value="days_on_market|asc">Nyeste først</option>
      <option value="price|asc">Pris ↑</option>
      <option value="price|desc">Pris ↓</option>
      <option value="commute_minutes|asc">Køretid ↑</option>
    </select>
  </div>
  <div id="cards-container"></div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
  const HOME_ADDRESS = "Egevangen 19, 2700 København, Danmark";
  const HOME_ENC     = encodeURIComponent(HOME_ADDRESS);

  // ── Huslejeregler ─────────────────────────────────────
  // Postnumre der er undtaget fra huslejeregulering (tilføj efter behov)
  const UNREG_ZIPS  = new Set(["2980","2990","3050","3480","2670","2690","2680"]);
  // Boligtyper der altid er uregulerede (markedsleje)
  const UNREG_TYPES = new Set(["villa","villalejlighed","rækkehus","landejendom"]);
  function isUnregulated(p) {
    return UNREG_TYPES.has(p.property_type) || UNREG_ZIPS.has(String(p.zip_code));
  }

  // ── Google Sheets (lejedata-drilldown) ───────────────
  // Apps Script URL — se dokumentation/sheets_filter_script.js for deploy-guide.
  // Sæt til Web App URL efter deploy (https://script.google.com/macros/s/.../exec):
  const SHEETS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3O-rAdT2shwEgOh-mPdOo8CjkGd8jjJDGUKYQh3z5ccOQcQAYuQRWE6DcEPGkitZvwg/exec";

  // ── API-konfiguration ─────────────────────────────────
  // Worker URL sættes efter Cloudflare deploy — erstat placeholder:
  const WORKER_URL = "https://proqual-api.proqual.workers.dev";
  const LS_KEY     = "proqual_api_key";

  function getApiKey() {
    return localStorage.getItem(LS_KEY) || "";
  }

  function apiFetch(path, options = {}) {
    const key = getApiKey();
    const headers = { ...(options.headers || {}), "X-API-Key": key };
    return fetch(WORKER_URL + path, { ...options, headers });
  }

  function showPasswordPrompt(onSuccess) {
    const overlay = document.createElement("div");
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(15,23,42,0.92);
      display:flex;align-items:center;justify-content:center;z-index:9999;
    `;
    overlay.innerHTML = `
      <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;
                  padding:40px;max-width:360px;width:90%;text-align:center;">
        <div style="font-size:32px;margin-bottom:12px;">🔐</div>
        <h2 style="color:#f1f5f9;margin:0 0 8px">Ejendomsoversigt</h2>
        <p style="color:#94a3b8;font-size:14px;margin:0 0 24px">Indtast adgangskode for at fortsætte</p>
        <input id="pw-input" type="password" placeholder="Adgangskode"
          style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #475569;
                 background:#0f172a;color:#f1f5f9;font-size:15px;box-sizing:border-box;
                 outline:none;margin-bottom:12px;" />
        <div id="pw-error" style="color:#f87171;font-size:13px;min-height:20px;margin-bottom:8px;"></div>
        <button id="pw-btn"
          style="width:100%;padding:11px;background:#3b82f6;color:#fff;border:none;
                 border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;">
          Log ind
        </button>
      </div>
    `;
    document.body.appendChild(overlay);
    const input = overlay.querySelector("#pw-input");
    const btn   = overlay.querySelector("#pw-btn");
    const err   = overlay.querySelector("#pw-error");
    input.focus();

    async function attempt() {
      const key = input.value.trim();
      if (!key) return;
      btn.disabled = true;
      btn.textContent = "Tjekker…";
      // Test nøglen mod /api/meta
      try {
        const res = await fetch(WORKER_URL + "/api/meta", {
          headers: { "X-API-Key": key }
        });
        if (res.ok) {
          localStorage.setItem(LS_KEY, key);
          overlay.remove();
          onSuccess();
        } else {
          err.textContent = "Forkert adgangskode — prøv igen.";
          input.value = "";
          input.focus();
          btn.disabled = false;
          btn.textContent = "Log ind";
        }
      } catch {
        err.textContent = "Kunne ikke nå serveren — tjek forbindelsen.";
        btn.disabled = false;
        btn.textContent = "Log ind";
      }
    }

    btn.addEventListener("click", attempt);
    input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
  }

  // ── State ─────────────────────────────────────────────
  let allData    = [];
  let annotations = {};   // property_id → annotation obj
  let sortCol    = "yield_v2_pct";
  let sortDir    = "desc";
  let statusFilter = "all";  // all | favorite | disqualified
  let activeRowId  = null;   // session-lås: denne ejendom vises altid uanset filtre

  // Modal state
  let modalPropId      = null;
  let modalItems       = [];
  let modalRenoStatus  = "none";
  let modalLejeMode    = "auto";       // "auto" | "manual"
  let modalCustomLeje  = null;
  let modalCustomLejeNote = "";
  let modalPriceMode   = "original";   // "original" | "custom"
  let modalCustomPrice = null;
  let modalCustomPriceNote = "";

  const MIN_N_RELIABLE = 5;

  // ── Formatters ────────────────────────────────────────
  const fmt  = v => v != null ? new Intl.NumberFormat("da-DK").format(Math.round(v)) : "–";
  const fmtKr = v => v != null ? fmt(v) + "\u00a0kr" : "–";
  const fmtPct = v => v != null ? v.toFixed(1) + "%" : null;
  function domCell(days) {
    if (days == null) return `<span style="color:#cbd5e1">–</span>`;
    if (days < 7)  return `<span class="badge-ny" style="font-size:11px">${days}d</span>`;
    const color = days > 180 ? "#b91c1c" : days > 90 ? "#d97706" : "inherit";
    return `<span style="font-size:12px;color:${color}">${days}<span style="font-size:10px;color:#94a3b8"> d</span></span>`;
  }

  function fmtDuration(min) {
    if (min == null) return "–";
    const m = Math.round(min);
    if (m < 60) return m + "\u00a0min";
    return Math.floor(m / 60) + "\u00a0t\u00a0" + (m % 60) + "\u00a0min";
  }
  const TYPE_ICON = { villa:"🏠", ejerlejlighed:"🏢", rækkehus:"🏘️", villalejlighed:"🏡", landejendom:"🌾" };
  const TYPE_DA   = { villa:"Villa", ejerlejlighed:"Ejerlejl.", rækkehus:"Rækkehus", villalejlighed:"Villalejl.", landejendom:"Landejendom" };
  const STATUS_ICON = { neutral:"⭐", favorite:"⭐", disqualified:"❌", pinned:"📌" };

  function esc(s) {
    return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function yieldClass(v, n) {
    if (v == null)                return "yield-none";
    if ((n ?? 0) < MIN_N_RELIABLE) return "yield-thin";
    if (v >= 6) return "yield-high";
    if (v >= 4) return "yield-mid";
    return "yield-low";
  }

  function getAnnotation(id) {
    return annotations[id] || { status:"neutral", renovation_items:[], renovation_status:"none", notes:"", custom_leje:null, custom_leje_note:"", custom_price:null, custom_price_note:"" };
  }

  // Effektiv månedsleje: bruger manuel override → V2-model → m²-metode (fallback)
  function effectiveLeje(p, ann) {
    if (ann.custom_leje && ann.custom_leje > 0) return ann.custom_leje;

  function renoTotal(items) {
    return items.reduce((s, it) => s + (parseFloat(it.cost) || 0), 0);

  function getUdbetaling() {

  // Låneberegning: realkredit-model
  // Etablering = 9.000 kr + 1,5% af lånebeløb
  // Månedlig ydelse = (lån + etablering) × 0,0041
  function computeLoan(totalpris, udbetaling) {
    const laan       = Math.max(0, totalpris - udbetaling);
    const etablering = 9000 + 0.015 * laan;
    const ydelse     = (laan + etablering) * 0.0041;
    const ratio      = totalpris > 0 ? laan / totalpris : 0;
    return { laan, ydelse, ratio };
  }

  // Beregn afkast baseret på valgt afkasttype
  function computeDisplayYield(type, leje, ejerudgift, ydelse, adjPrice, udbetaling, p) {
    if (type === "teoretisk") {
      if (leje != null && adjPrice > 0) return Math.round(leje * 12 / adjPrice * 1000) / 10;
      return p.yield_v2_pct ?? p.yield_sqm_pct;
    }
    if (leje == null) return null;
    const cashflow = leje - ejerudgift - ydelse;
    if (type === "finansieret") return adjPrice > 0 ? Math.round(cashflow * 12 / adjPrice * 1000) / 10 : null;
    if (type === "kontant")     return udbetaling > 0 ? Math.round(cashflow * 12 / udbetaling * 1000) / 10 : null;
    return null;
  }

  function showTooltip(e, p) {
    tooltip.innerHTML = buildLejeTooltip(p);
    tooltip.classList.add("visible");
    positionTooltip(e);
  }
  function positionTooltip(e) {
    const pad=12, tw=240, th=tooltip.offsetHeight||200;
    // Touch/mobil: centrér på skærmen
    if (window.innerWidth < 600) {
      tooltip.style.left = Math.round((window.innerWidth - tw) / 2) + "px";
      tooltip.style.top  = Math.round((window.innerHeight - th) / 2) + "px";
      return;
    }
    let x=e.clientX+pad, y=e.clientY-th/2;
    if (x+tw>window.innerWidth-pad)  x=e.clientX-tw-pad;
    if (y<pad)                        y=pad;
    if (y+th>window.innerHeight-pad) y=window.innerHeight-th-pad;
    tooltip.style.left=x+"px"; tooltip.style.top=y+"px";
  }
  document.addEventListener("mousemove", e => { if (tooltip.classList.contains("visible")) positionTooltip(e); });
  document.addEventListener("click", () => tooltip.classList.remove("visible"));

  // ── Load data (STATISK — data er bagt ind i denne fil) ──────────────────
  async function loadData() {
    try {
      const data = window.__STATIC_DATA__;
      allData    = data.properties;
      const meta = data.meta;

      // Annotations fra Cloudflare Worker (samme Turso som live-versionen)
      try {
        const annRes = await apiFetch("/api/annotations");
        if (annRes.ok) annotations = await annRes.json();
      } catch (e) {
        console.warn("Kunne ikke indlæse annotations fra Worker:", e);
      }

      const chipsDiv = document.getElementById("f-type-chips");
      meta.property_types.forEach(t => {
        const chip = document.createElement("button");
        chip.className = "type-chip" + (t !== "villalejlighed" ? " active" : "");
        chip.dataset.type = t;
        chip.textContent = (TYPE_ICON[t]||"") + " " + (TYPE_DA[t]||t);
        chip.addEventListener("click", () => {
          chip.classList.toggle("active");
          renderTable();
          updateFilterBadge();
        });
        chipsDiv.appendChild(chip);
      });
      const dt = meta.scraped_at ? meta.scraped_at.slice(0,16).replace("T"," ") : "–";
      const exp = data.exported_at ? data.exported_at.slice(0,10) : "";
      document.getElementById("meta-info").innerHTML =
        `${meta.total} boliger<br><span style="font-size:10px">Data fra ${dt}${exp ? " · Eksport "+exp : ""}</span>`;
      document.getElementById("loading").style.display = "none";
      renderTable();
    } catch (err) {
      document.getElementById("loading").innerHTML =
        `<span style="color:#dc2626">⚠️ Fejl ved indlæsning af data: ${err.message}</span>`;
    }
  }

  // ── Save annotation (STATISK — gemmes i Turso via Cloudflare Worker) ───────
  async function saveAnnotation(id, patch) {
    const current = getAnnotation(id);
    const updated = { ...current, ...patch };
    annotations[id] = updated;
    await apiFetch(`/api/annotations/${id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(updated),
    });
  }

  // ── Cycle status ──────────────────────────────────────
  // Cycle: neutral → favorite → disqualified → pinned → neutral
  function buildAnnTooltip(id) {
    const ann = getAnnotation(id);
    const lines = [];
    if (ann.status === "favorite")     lines.push("⭐ Favorit");
    if (ann.status === "pinned")       lines.push("📌 Pinned");
    if (ann.status === "disqualified") lines.push("❌ Diskvalificeret");
    if (ann.custom_price  > 0) lines.push(`💰 Forhandlet pris: ${fmt(ann.custom_price)} kr`);
    if (ann.custom_leje   > 0) lines.push(`🏠 Manuel leje: ${fmt(ann.custom_leje)} kr/md`);
    if (ann.renovation_items?.length)  lines.push(`🔨 Renovering: ${ann.renovation_items.length} post(er)`);
    if (ann.notes?.trim())             lines.push(`📝 Note: ${ann.notes.trim().slice(0,60)}${ann.notes.length>60?"…":""}`);
    return lines.length ? lines.join("\n") : null;
  }

  function cycleStatus(id) {
    const cur = getAnnotation(id).status;
    const next = { neutral:"favorite", favorite:"disqualified", disqualified:"pinned", pinned:"neutral" }[cur] || "favorite";
    // Lås rækken i view så ejendommen ikke forsvinder ved filterskift
    activeRowId = id;
    saveAnnotation(id, { status: next }).then(() => renderTable());
  }

  function getSelectedTypes() {
    const all    = document.querySelectorAll(".type-chip");
    const active = document.querySelectorAll(".type-chip.active");
    if (!all.length || active.length === all.length) return null; // ingen filtrering

    document.querySelectorAll(".type-chip").forEach(chip => {
