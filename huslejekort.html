<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huslejekort – Sjælland & København</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#1a1a2e; color:#eee; }

#header {
  padding:10px 18px 8px;
  background:#16213e;
  border-bottom:1px solid #0f3460;
}
#header-top {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:8px;
}
#header h1 { font-size:1.1rem; font-weight:600; color:#e2e8f0; }
#header p  { font-size:0.76rem; color:#94a3b8; margin-top:1px; }

/* ── Knapper ── */
.btn-group { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.ctrl-btn {
  padding:5px 13px; border-radius:6px; border:1px solid #334155;
  background:#0f3460; color:#e2e8f0; cursor:pointer; font-size:0.78rem;
  transition:all .15s; white-space:nowrap;
}
.ctrl-btn.active  { background:#3b82f6; border-color:#3b82f6; }
.ctrl-btn:hover   { background:#1d4ed8; border-color:#1d4ed8; }
.ctrl-btn.sub     { padding:4px 10px; font-size:0.73rem;
                    background:#0c2340; border-color:#253a55; }
.ctrl-btn.sub.active { background:#0f766e; border-color:#0f766e; }
.ctrl-btn.sub:hover  { background:#0d9488; border-color:#0d9488; }
.ctrl-btn.disabled   { opacity:.35; cursor:default; }

/* ── Sub-filter bar ── */
#sub-filter {
  margin-top:7px;
  display:flex; align-items:center; flex-wrap:wrap; gap:8px;
  padding:6px 10px;
  background:rgba(15,34,64,.6); border-radius:8px;
  border:1px solid #1e3a5f;
}
#sub-filter.hidden { display:none; }
.filter-label { font-size:0.72rem; color:#64748b; white-space:nowrap; }
.filter-sep   { color:#334155; font-size:0.9rem; margin:0 2px; }

/* ── Kort ── */
#map { width:100%; height:calc(100vh - 120px); }

/* ── Legend ── */
.legend {
  background:rgba(22,33,62,.96);
  padding:11px 14px; border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
  color:#e2e8f0; font-size:0.76rem; min-width:170px;
  border:1px solid #334155;
}
.legend h4 { margin-bottom:7px; font-size:0.8rem; color:#93c5fd; }
.legend-bar { height:13px; border-radius:4px; margin-bottom:4px; }
.legend-labels { display:flex; justify-content:space-between; font-size:0.7rem; color:#94a3b8; }
.legend-size { margin-top:10px; }
.legend-size-row { display:flex; align-items:center; gap:7px; margin:3px 0; }
.legend-dot { border-radius:50%; background:#64748b; opacity:.7; flex-shrink:0; }

/* ── Stats bar ── */
#stats-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(10,18,36,.93);
  padding:6px 18px; font-size:0.76rem; color:#64748b;
  border-top:1px solid #1e293b;
  display:flex; gap:20px; flex-wrap:wrap; z-index:1000;
}
#stats-bar span { color:#e2e8f0; }
#stats-bar .filter-tag {
  padding:1px 8px; border-radius:4px; background:#0f3460;
  color:#93c5fd; font-size:0.72rem; margin-left:4px;
}

/* ── Popup ── */
.leaflet-popup-content-wrapper {
  background:#1e293b!important; color:#e2e8f0!important;
  border:1px solid #334155!important; border-radius:10px!important;
  box-shadow:0 4px 20px rgba(0,0,0,.5)!important;
}
.leaflet-popup-tip { background:#1e293b!important; }
.popup-zip   { font-size:1.05rem; font-weight:700; color:#93c5fd; margin-bottom:1px; }
.popup-city  { font-size:0.8rem; color:#94a3b8; margin-bottom:7px; }
.popup-grid  { display:grid; grid-template-columns:1fr 1fr; gap:3px 12px; font-size:0.78rem; }
.popup-label { color:#94a3b8; }
.popup-value { font-weight:600; color:#e2e8f0; text-align:right; }
.popup-value.hi { color:#34d399; }
.popup-bar   { margin-top:7px; height:5px; border-radius:3px; background:#334155; }
.popup-bar-fill { height:100%; border-radius:3px; }
.popup-nodata { font-size:0.78rem; color:#64748b; font-style:italic; padding:4px 0; }
.popup-filter-badge {
  display:inline-block; font-size:0.68rem; padding:1px 7px;
  border-radius:4px; background:#0f3460; color:#93c5fd; margin-bottom:6px;
}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <h1>🏠 Huslejekort – Storkøbenhavn &amp; Nordsjælland</h1>

    </div>

      <button class="ctrl-btn"        data-mode="count" onclick="setMode('count')">Antal annoncer</button>

      <button class="ctrl-btn sub"        data-sf="5"   onclick="setSub('5')">5+ vær.</button>
    </div>
    <span class="filter-sep">·</span>
    <span class="filter-label">Størrelse:</span>
    <div class="btn-group">
      <button class="ctrl-btn sub" data-sf="sz_s"  onclick="setSub('sz_s')">&lt;50 m²</button>

      <button class="ctrl-btn sub" data-sf="sz_l"  onclick="setSub('sz_l')">75–99 m²</button>
      <button class="ctrl-btn sub" data-sf="sz_xl" onclick="setSub('sz_xl')">100+ m²</button>
    </div>
  </div>
</div>

<div id="map"></div>

<div id="stats-bar">

  Højeste: <span id="stat-max">–</span> &nbsp;|&nbsp;

</div>

// HJÆLPEFUNKTIONER
// ═══════════════════════════════════════════════════════════════
function lerp(a,b,t){ return a+(b-a)*t; }

function rentColor(v, lo, hi) {
  const t = Math.min(1, Math.max(0, (v-lo)/(hi-lo)));
  let r,g,b;
  if (t < 0.33) { const s=t/0.33;      r=Math.round(lerp(34,234,s));  g=Math.round(lerp(197,179,s)); b=Math.round(lerp(94,8,s));  }
  else if(t<0.66){const s=(t-0.33)/0.33;r=Math.round(lerp(234,249,s));g=Math.round(lerp(179,115,s));b=Math.round(lerp(8,22,s));  }
  else           {const s=(t-0.66)/0.34;r=Math.round(lerp(249,239,s));g=Math.round(lerp(115,68,s)); b=Math.round(lerp(22,68,s)); }
  return `rgb(${r},${g},${b})`;
}
function countColor(c,lo,hi){
  const t=Math.min(1,Math.max(0,(c-lo)/(hi-lo)));
  return `hsl(${Math.round(220-t*180)},80%,${Math.round(65-t*25)}%)`;
}
function fmt(n){  return n!=null ? n.toLocaleString('da-DK')+' kr' : '–'; }
function fmtSqm(n){ return n!=null ? (n*12).toLocaleString('da-DK')+' kr/m²/år' : '–'; }
function radius(c,lo,hi){ const t=Math.log(Math.max(1,c-lo+1))/Math.log(hi-lo+1); return 8+t*27; }
function med(arr){ const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]; }

// ═══════════════════════════════════════════════════════════════
// TILSTAND
// ═══════════════════════════════════════════════════════════════
let currentMode = 'rent';
let currentSub  = 'all';   // 'all' | '1'..'5' | 'sz_s'|'sz_m'|'sz_l'|'sz_xl'

const SZ_KEY = { sz_s:'s', sz_m:'m', sz_l:'l', sz_xl:'xl' };
const SZ_LABEL = { sz_s:'< 50 m²', sz_m:'50–74 m²', sz_l:'75–99 m²', sz_xl:'100+ m²' };
const ROOM_LABEL = { '1':'1 værelse','2':'2 værelser','3':'3 værelser','4':'4 værelser','5':'5+ værelser' };

// Forudberegnede min/max/median for hele stamdata
const rentVals  = DATA.map(d=>d.avg);
const sqmVals   = DATA.map(d=>d.sqm);
const countVals = DATA.map(d=>d.count);
const minRent=Math.min(...rentVals), maxRent=Math.max(...rentVals);
const minSqm =Math.min(...sqmVals),  maxSqm =Math.max(...sqmVals);
const minCnt =Math.min(...countVals),maxCnt =Math.max(...countVals);
const totalListings = DATA.reduce((s,d)=>s+d.count,0);

// ═══════════════════════════════════════════════════════════════
// KORT
// ═══════════════════════════════════════════════════════════════
const map = L.map('map',{ center:[55.78,12.35], zoom:10, zoomControl:true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://carto.com/attributions">CARTO</a> &copy; OSM',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

let circleLayer = L.layerGroup().addTo(map);

// ═══════════════════════════════════════════════════════════════
// TEGN CIRKLER
// ═══════════════════════════════════════════════════════════════
function drawCircles() {
  circleLayer.clearLayers();

  // Saml de værdier der faktisk bruges, til dynamisk farve-range
  let activeVals = [];

  DATA.forEach(d => {
    let val = null, cnt = 0;

    if (currentMode === 'rent') {
      if (currentSub === 'all') {
        val = d.avg; cnt = d.count;
      } else if (currentSub.startsWith('sz_')) {
        const k = SZ_KEY[currentSub];
        const sd = SQM_DATA[d.zip];
        if (sd && sd[k]) { val = sd[k].avg; cnt = sd[k].count; }
      } else {
        const rd = ROOMS_DATA[d.zip];
        if (rd && rd[currentSub]) { val = rd[currentSub].avg; cnt = rd[currentSub].count; }
      }
    } else if (currentMode === 'sqmyr') {
      val = d.sqm; cnt = d.count;
    } else {
      val = d.count; cnt = d.count;
    }

    if (val != null) activeVals.push(val);
  });

  if (activeVals.length === 0) return;
  const lo = Math.min(...activeVals), hi = Math.max(...activeVals);
  const medVal = med(activeVals);

  // Opdater stats
  updateStats(lo, hi, medVal, activeVals.length);

  DATA.forEach(d => {
    let val = null, cnt = 0;

    if (currentMode === 'rent') {
      if (currentSub === 'all') {
        val = d.avg; cnt = d.count;
      } else if (currentSub.startsWith('sz_')) {
        const k = SZ_KEY[currentSub];
        const sd = SQM_DATA[d.zip];
        if (sd && sd[k]) { val = sd[k].avg; cnt = sd[k].count; }
      } else {
        const rd = ROOMS_DATA[d.zip];
        if (rd && rd[currentSub]) { val = rd[currentSub].avg; cnt = rd[currentSub].count; }
      }
    } else if (currentMode === 'sqmyr') {
      val = d.sqm; cnt = d.count;
    } else {
      val = d.count; cnt = d.count;
    }

    const hasData = (val != null);
    const r = hasData ? radius(cnt, 1, maxCnt) : 5;
    const color = hasData
      ? (currentMode === 'count' ? countColor(val,lo,hi) : rentColor(val,lo,hi))
      : '#1e293b';
    const borderColor = hasData ? 'rgba(255,255,255,.25)' : '#334155';

    // Popup-indhold
    let popupHTML = `<div class="popup-zip">${d.zip}</div><div class="popup-city">${d.city||'–'}</div>`;

    if (!hasData) {
      popupHTML += `<div class="popup-nodata">Ingen data for dette filter</div>`;
    } else {
      // Badge der viser aktivt filter
      if (currentMode === 'rent' && currentSub !== 'all') {
        const badge = currentSub.startsWith('sz_') ? SZ_LABEL[currentSub] : ROOM_LABEL[currentSub];
        popupHTML += `<div class="popup-filter-badge">${badge}</div>`;
      }

      const rentPct = (val - lo) / (hi - lo || 1);
      popupHTML += `<div class="popup-grid">`;

      if (currentMode === 'rent') {
        popupHTML += `<span class="popup-label">Gns. leje</span><span class="popup-value hi">${fmt(val)}/md</span>`;
        if (currentSub !== 'all') {
          popupHTML += `<span class="popup-label">Gns. alle typer</span><span class="popup-value">${fmt(d.avg)}/md</span>`;
        }
        popupHTML += `<span class="popup-label">Kr/m²/år</span><span class="popup-value">${fmtSqm(d.sqm)}</span>`;
        popupHTML += `<span class="popup-label">Annoncer</span><span class="popup-value">${cnt.toLocaleString('da-DK')}</span>`;
      } else if (currentMode === 'sqmyr') {
        popupHTML += `<span class="popup-label">Kr/m²/år</span><span class="popup-value hi">${fmtSqm(val)}</span>`;
        popupHTML += `<span class="popup-label">Gns. leje</span><span class="popup-value">${fmt(d.avg)}/md</span>`;
        popupHTML += `<span class="popup-label">Annoncer</span><span class="popup-value">${d.count.toLocaleString('da-DK')}</span>`;
      } else {
        popupHTML += `<span class="popup-label">Annoncer</span><span class="popup-value hi">${val.toLocaleString('da-DK')}</span>`;
        popupHTML += `<span class="popup-label">Gns. leje</span><span class="popup-value">${fmt(d.avg)}/md</span>`;
      }

      popupHTML += `</div>`;
      popupHTML += `<div class="popup-bar"><div class="popup-bar-fill" style="width:${Math.round(rentPct*100)}%;background:${color}"></div></div>`;
    }

    // Tooltip-tekst
    let tip;
    if (!hasData) {
      tip = `<b>${d.zip}</b> ${d.city||''}<br><i style="color:#64748b">Ingen data</i>`;
    } else if (currentMode === 'count') {
      tip = `<b>${d.zip}</b> ${d.city||''}<br>${val.toLocaleString('da-DK')} annoncer`;
    } else if (currentMode === 'sqmyr') {
      tip = `<b>${d.zip}</b> ${d.city||''}<br>${fmtSqm(val)}`;
    } else {
      tip = `<b>${d.zip}</b> ${d.city||''}<br>${fmt(val)}/md`;
    }

    L.circleMarker([d.lat, d.lng], {
      radius: r,
      fillColor: color,
      color: borderColor,
      weight: 1.2,
      fillOpacity: hasData ? 0.82 : 0.2
    })
    .bindPopup(popupHTML, { maxWidth:240 })
    .bindTooltip(tip, { direction:'top', offset:[0,-r], opacity:.95 })
    .addTo(circleLayer);
  });

  // Opdatér legend range
  updateLegendRange(lo, hi, medVal);
}

// ═══════════════════════════════════════════════════════════════
// LEGEND
// ═══════════════════════════════════════════════════════════════
const legend = L.control({ position:'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <h4 id="legend-title">Månedsleje (alle)</h4>
    <div class="legend-bar" id="legend-bar" style="background:linear-gradient(to right,#22c55e,#eab308,#f97316,#ef4444)"></div>
    <div class="legend-labels">
      <span id="leg-min">–</span><span id="leg-mid">–</span><span id="leg-max">–</span>
    </div>
    <div class="legend-size" style="margin-top:10px;">
      <div style="font-size:0.74rem;color:#93c5fd;margin-bottom:4px;">Cirkelstørrelse = antal</div>
      <div class="legend-size-row"><div class="legend-dot" style="width:14px;height:14px;"></div><span>Få annoncer</span></div>
      <div class="legend-size-row"><div class="legend-dot" style="width:26px;height:26px;"></div><span>Mange annoncer</span></div>
    </div>`;
  return div;
};
legend.addTo(map);

function updateLegendTitle() {
  const titles = {
    rent: {
      all:'Månedsleje (alle)', '1':'1 værelse', '2':'2 værelser', '3':'3 værelser',
      '4':'4 værelser', '5':'5+ værelser',
      sz_s:'< 50 m²', sz_m:'50–74 m²', sz_l:'75–99 m²', sz_xl:'100+ m²'
    },
    sqmyr:'Kr/m²/år',
    count:'Antal annoncer'
  };
  const t = currentMode === 'rent' ? titles.rent[currentSub] : titles[currentMode];
  document.getElementById('legend-title').textContent = t;
}

function updateLegendRange(lo, hi, medV) {
  if (currentMode === 'count') {
    document.getElementById('leg-min').textContent = lo.toLocaleString('da-DK');
    document.getElementById('leg-mid').textContent = Math.round(medV).toLocaleString('da-DK');
    document.getElementById('leg-max').textContent = hi.toLocaleString('da-DK');
    document.getElementById('legend-bar').style.background =
      'linear-gradient(to right,hsl(220,80%,65%),hsl(130,80%,55%),hsl(40,80%,40%))';
  } else if (currentMode === 'sqmyr') {
    document.getElementById('leg-min').textContent = (lo*12).toLocaleString('da-DK')+' kr';
    document.getElementById('leg-mid').textContent = (medV*12).toLocaleString('da-DK')+' kr';
    document.getElementById('leg-max').textContent = (hi*12).toLocaleString('da-DK')+' kr';
    document.getElementById('legend-bar').style.background =
      'linear-gradient(to right,#22c55e,#eab308,#f97316,#ef4444)';
  } else {
    document.getElementById('leg-min').textContent = (lo/1000).toFixed(0)+'k kr';
    document.getElementById('leg-mid').textContent = (medV/1000).toFixed(1)+'k kr';
    document.getElementById('leg-max').textContent = (hi/1000).toFixed(0)+'k kr';
    document.getElementById('legend-bar').style.background =
      'linear-gradient(to right,#22c55e,#eab308,#f97316,#ef4444)';
  }
}

function updateStats(lo, hi, medV, n) {
  const suffix = currentMode === 'count' ? ' annoncer' : (currentMode === 'sqmyr' ? '' : '/md');
  const fv = v => currentMode === 'sqmyr' ? fmtSqm(v) : (currentMode === 'count' ? v.toLocaleString('da-DK')+suffix : fmt(v)+suffix);
  document.getElementById('stat-min').textContent = fv(lo);
  document.getElementById('stat-med').textContent = fv(Math.round(medV));
  document.getElementById('stat-max').textContent = fv(hi);
  document.getElementById('stat-total').textContent = totalListings.toLocaleString('da-DK');
}

// ═══════════════════════════════════════════════════════════════
// KNAPPER
// ═══════════════════════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  if (mode !== 'rent') currentSub = 'all';

  document.querySelectorAll('.ctrl-btn[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode===mode));
  document.getElementById('sub-filter').classList.toggle('hidden', mode !== 'rent');

  updateLegendTitle();
  drawCircles();
}

function setSub(sf) {
  currentSub = sf;
  document.querySelectorAll('.ctrl-btn[data-sf]').forEach(b => b.classList.toggle('active', b.dataset.sf===sf));
  updateLegendTitle();
  drawCircles();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.getElementById('zip-count').textContent = DATA.length;
document.getElementById('listing-count').textContent = totalListings.toLocaleString('da-DK');
drawCircles();
</script>
</body>
</html>
