name: Deploy statisk HTML til GitHub Pages

# Kør automatisk når docs/index.html pushes til main
# (Mac Mini genererer filen og pusher — dette workflow deployer den)
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:   # Kan også startes manuelt fra GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Undgå parallelle deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ som Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
